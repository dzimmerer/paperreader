server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend service (Kubernetes DNS name).
    location /api/ {
        proxy_pass http://backend:5101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # PDF uploads can be a few MB.
        client_max_body_size 64m;

        # TTS synthesis (audio endpoint) can take a while on first request.
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
