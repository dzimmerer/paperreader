server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend service (Kubernetes DNS name).
    location /api/ {
        proxy_pass http://backend:5101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # PDF uploads can be a few MB.
        client_max_body_size 64m;

        # TTS synthesis (audio endpoint) can take a while on first request.
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # Local app that's rebuilt often: never serve stale HTML/CSS/JS so a
        # redeploy always takes effect without a manual hard-refresh.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }
}
