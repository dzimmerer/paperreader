# Rate-limit the API per client IP to blunt floods/abuse on the public, no-auth
# endpoint. ~8 req/s sustained with a burst absorbs normal playback (prefetch +
# audio fetches) while throttling scripts. Document loads are limited separately.
limit_req_zone $binary_remote_addr zone=api:10m rate=8r/s;
limit_req_zone $binary_remote_addr zone=docload:10m rate=1r/s;
limit_req_status 429;
limit_conn_zone $binary_remote_addr zone=conns:10m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    limit_conn conns 24;

    # Document creation (parse + fetch) is expensive: stricter limit.
    location = /api/doc {
        limit_req zone=docload burst=5 nodelay;
        proxy_pass http://backend:5101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 64m;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Reverse-proxy API calls to the backend service (Kubernetes DNS name).
    location /api/ {
        limit_req zone=api burst=24 nodelay;
        proxy_pass http://backend:5101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # PDF uploads can be a few MB.
        client_max_body_size 64m;

        # TTS synthesis (audio endpoint) can take a while on first request.
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # Local app that's rebuilt often: never serve stale HTML/CSS/JS so a
        # redeploy always takes effect without a manual hard-refresh.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }
}
