apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts
  namespace: paperreader
  labels: { app: tts }
spec:
  replicas: 1
  selector:
    matchLabels: { app: tts }
  template:
    metadata:
      labels: { app: tts }
    spec:
      # Disable legacy service-link env vars (e.g. an injected TTS_PORT=tcp://…
      # would shadow our own TTS_PORT and crash the server).
      enableServiceLinks: false
      containers:
        - name: tts
          image: paperreader-tts:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5102
          env:
            - name: TTS_ENGINE
              value: "kokoro"
            - name: TTS_VOICE
              value: "af_sarah"
            - name: TTS_DEVICE
              value: "cpu"        # no GPU inside minikube; CPU is best for Kokoro
            - name: TTS_PORT
              value: "5102"
          # startupProbe gives the model time to load before liveness kicks in.
          startupProbe:
            httpGet: { path: /health, port: 5102 }
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: { path: /health, port: 5102 }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 5102 }
            periodSeconds: 20
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "4", memory: "3Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: tts
  namespace: paperreader
spec:
  selector: { app: tts }
  ports:
    - port: 5102
      targetPort: 5102
