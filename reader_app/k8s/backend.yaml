apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: paperreader
  labels: { app: backend }
spec:
  # Single replica: the shared on-disk store lives in this pod's emptyDir, so
  # workers in this pod share it but a second replica would not.
  replicas: 1
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      enableServiceLinks: false
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: backend
          image: paperreader-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5101
          env:
            - name: TTS_URL
              value: "http://tts:5102"
            - name: READER_PORT
              value: "5101"
            - name: READER_DATA_DIR
              value: "/data/docs"
            - name: HOME
              value: "/tmp"
            - name: TMPDIR
              value: "/tmp"
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: data, mountPath: /data }
            - { name: tmp, mountPath: /tmp }
          readinessProbe:
            httpGet: { path: /api/health, port: 5101 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 5101 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            # PDF parsing (pymupdf4llm page pixmaps + Tesseract OCR) can spike
            # memory on large papers; 1Gi OOM-killed the MAI-Thinking PDF.
            requests: { cpu: "200m", memory: "512Mi" }
            limits: { cpu: "2", memory: "3Gi" }
      volumes:
        - { name: data, emptyDir: {} }
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: paperreader
spec:
  selector: { app: backend }
  ports:
    - port: 5101
      targetPort: 5101
